<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API DeepSeek</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #response {
            margin-top: 20px;
            padding: 10px;
            min-height: 50px;
        }

        #response h3 {
            color: #335;
            font-size: 1.2em;
        }

        #response strong {
            color: #d9534f;
        }

        #response ul {
            padding-left: 20px;
        }

        #response li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Free Bot</h2>
        <div class="form-group">
            <input type="text" class="form-control" id="userInput" placeholder="Escribe tu pregunta">
        </div>
        <button class="btn btn-success" onclick="sendMessage()">¡Preguntar!</button>
        <div id="response"></div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput').value.trim();
            const responseDiv = document.getElementById('response');

            if (!input) {
                responseDiv.innerHTML = 'Por favor, ingresa un mensaje.';
                return;
            }

            responseDiv.innerHTML = 'Cargando...';

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        Authorization: 'Bearer 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',
                        'HTTP-Referer': '<your_site_url>',
                        'X-Title': '<your_site_name>',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'deepseek/deepseek-r1:free',
                        messages: [{ role: 'user', content: input }],
                    }),
                });

                const data = await response.json();
                console.log(data);

                const markdownText = data.choices?.[0]?.message?.content || 'No se recibió respuesta.';
                responseDiv.innerHTML = marked.parse(markdownText);
            } catch (error) {
                responseDiv.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>

</html>
