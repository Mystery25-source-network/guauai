      color: #fff;

      flex-direction: column;

      position: relative;
    }

    #vanta-bg {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;

      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);

    header {

    .container {

    }

    .time-container {

    }

    .date-container {
      font-size: 1.5rem;
      animation: fadeInUp 1s;
      position: relative;
      top: 5rem;
    }

    .greeting-container {

      position: relative;
      top: 5.5rem;

    .weather-container {
      font-size: 1.2rem;

      display: flex;

    .weather-icon {

    .search-container {

      flex-direction: column;

    .search-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 8em;
    margin-bottom: 1rem;
    animation: zoomIn 1s;
}

.search-container input[type="text"] {
    width: 89%;
    height: 25px;
    padding: 0.5rem;
    border: 8px solid #ccc;
    border-radius: 0.25rem;
    font-size: 1rem;
    color: #fff;
    background-color: transparent;
    outline: none; }
.search-container input[type="text"]::placeholder {
    color: rgba(255, 255, 255, 0.6);
    animation: animated-border 5s linear infinite;
    border-image: linear-gradient(270deg, #ff6ec4, #7873f5, #4ade80, #ff6ec4);
}

/* 🔥 Borde animado con pseudo-elemento */
.search-container input[type="text"]:focus {
    border-image: linear-gradient(270deg, #ff6ec4, #7873f5, #4ade80, #ff6ec4);
    border-image-slice: 1;
    animation: animated-border 5s linear infinite;
}
/* Alternativamente, animación más constante con glow */
@keyframes animated-border {
    0% {
        border-image-source: linear-gradient(270deg, #ff6ec4, #7873f5, #4ade80, #ff6ec4);
    }

    50% {
        border-image-source: linear-gradient(270deg, #4ade80, #ff6ec4, #7873f5, #4ade80);
    }

    100% {
        border-image-source: linear-gradient(270deg, #ff6ec4, #7873f5, #4ade80, #ff6ec4);
    }
}


    #luckyBtn {
      position: relative;
      width: 160px;
      height: 48px;
      background-color: transparent;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      overflow: hidden;
      z-index: 0;
    }

    #luckyBtn::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      background: linear-gradient(270deg, #00dbde, #fc00ff, #00dbde);
      background-size: 600% 600%;
      border-radius: 12px;
      z-index: -1;
      animation: vantaButton 6s ease infinite;
      filter: blur(6px);
    }

    @keyframes vantaButton {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .btn-container {
      display: flex;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .btn-container button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      font-size: 1rem;
      cursor: pointer;
      margin: 0 0.5rem;
    }

/* Search Button Styling */
#searchBtn {
  width: 20%; /* Set width for the search button */
  height: 35px;
  background-color: transparent;
  border: 2px solid #fff;  /* White border */
  color: #fff;
  font-size: 1rem;

/* Search Button Hover Effect */

    .tabs-container {

  <script>
    // Actualiza la hora cada segundo
    function updateTime() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12; // La hora 0 debe ser 12
      const time = `${hours}:${minutes < 10 ? '0' + minutes : minutes}:${seconds < 10 ? '0' + seconds : seconds} ${ampm}`;
      document.getElementById('time').textContent = time;
    }

    setInterval(updateTime, 1000);

    // Obtén la fecha y el día
    function updateDate() {
      const now = new Date();
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const day = days[now.getDay()];
      const date = now.getDate();
      const month = months[now.getMonth()];
      const year = now.getFullYear();
      document.getElementById('date').textContent = `${month} ${date}, ${year}`;
      document.getElementById('day').textContent = day;
    }

    updateDate();

    // Función de saludo según la hora
    function updateGreeting() {
      const now = new Date();
      const hours = now.getHours();
      let greeting = '';
      if (hours < 12) {
        greeting = 'Good Morning';
      } else if (hours < 18) {
        greeting = 'Good Afternoon';
      } else {
        greeting = 'Good Evening';
      }
      document.getElementById('greeting').textContent = greeting;
    }

    updateGreeting();

    // Función de clima
    async function getWeather() {
      const apiKey = 'API_KEY';  // Reemplaza esto con tu clave de API
      const city = 'New York'; // Aquí puedes cambiar la ciudad
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

      const response = await fetch(url);
      const data = await response.json();

      const icon = data.weather[0].icon;
      const description = data.weather[0].description;
      const temperature = data.main.temp;

      document.getElementById('weatherIcon').classList.add(`wi wi-owm-${icon}`);
      document.getElementById('weather').textContent = `${temperature}°C`;
      document.getElementById('weatherText').textContent = description;
    }

    getWeather();

    // Función de búsqueda
    document.getElementById('searchBtn').addEventListener('click', function () {
      const query = document.getElementById('searchInput').value;
      window.location.href = `https://www.searx.org/search?q=${encodeURIComponent(query)}`;
    });

    // Función Feeling Lucky
    document.getElementById('luckyBtn').addEventListener('click', function () {
      const query = document.getElementById('searchInput').value;
      window.location.href = `https://www.searx.org/search?q=${encodeURIComponent(query)}`;
    });

    // Cargar cita inspiradora
    async function getQuote() {
      const response = await fetch('https://api.quotable.io/random');
      const data = await response.json();
      document.getElementById('quote').textContent = `"${data.content}" - ${data.author}`;
    }

    getQuote();
  </script>
